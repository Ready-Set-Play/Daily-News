name: Test Suite

on:
  push:
    path-ignore:
      - '*.md'    
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: Ready-Set-Play/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: Ready-Set-Play/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (offline — cassettes only)
        run: pytest tests/ -v --tb=short
        working-directory: ${{ github.workspace }}
        env:
          PYTHONPATH: src
          ANTHROPIC_API_KEY: test
          RESEND_API_KEY: test
          NYT_API_KEY: test
          GNEWS_API_KEY: test
          REDDIT_CLIENT_ID: test
          REDDIT_CLIENT_SECRET: test
          RECIPIENT_EMAIL: test@example.com
          FROM_EMAIL: "Daily Brief <digest@example.com>"
