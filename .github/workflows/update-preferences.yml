name: Update Preferences


on:
  schedule:
    # Run every Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  update-prefs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update preference weights from feedback
        run: python src/update_preferences.py

      - name: Commit updated preferences
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/preferences.json
          git diff --staged --quiet || git commit -m "chore: update preferences from feedback [skip ci]"
          git push
