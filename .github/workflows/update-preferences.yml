name: Update Preferences


on:
  schedule:
    # Run every Sunday at 06:00 UTC
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  update-prefs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .

      - name: Set up Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv
          python3 -m venv venv
          echo "$GITHUB_WORKSPACE/venv/bin" >> $GITHUB_PATH

      - name: Update preference weights from feedback
        run: python3 src/update_preferences.py

      - name: Commit updated preferences
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/preferences.json
          git diff --staged --quiet || git commit -m "chore: update preferences from feedback [skip ci]"
          git push
