name: Daily News Digest

on:
  schedule:
    # 11:30 UTC = 05:30 CT (CST) / 06:30 CT (CDT)
    # Adjust to 10:30 UTC during daylight saving (mid-March through early-Nov)
    - cron: "0 13 * * 1,3,5"
  workflow_dispatch:  # Allow manual runs

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        run: git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .

      - name: Set up Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv
          python3 -m venv venv
          echo "$GITHUB_WORKSPACE/venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode config secrets
        env:
          CONFIG_SOURCES_B64: ${{ secrets.CONFIG_SOURCES_B64 }}
          CONFIG_TOPICS_B64: ${{ secrets.CONFIG_TOPICS_B64 }}
        run: |
          echo "$CONFIG_SOURCES_B64" | base64 -d > config/sources.yaml
          echo "$CONFIG_TOPICS_B64"  | base64 -d > config/topics.yaml

      - name: Run daily digest pipeline
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'anthropic' }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL || 'onboarding@resend.dev' }}
          FEEDBACK_BASE_URL: ${{ secrets.FEEDBACK_BASE_URL }}
        run: |
          cd src
          python main.py

      - name: Notify on failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL || 'onboarding@resend.dev' }}
        run: |
          python -c "
          import urllib.request, json, os
          payload = json.dumps({
            'from': os.environ.get('FROM_EMAIL', 'onboarding@resend.dev'),
            'to': [os.environ['RECIPIENT_EMAIL']],
            'subject': 'Daily Brief failed to deliver',
            'text': 'The daily digest pipeline failed. Check GitHub Actions logs for details.',
          }).encode()
          req = urllib.request.Request(
            'https://api.resend.com/emails',
            data=payload,
            headers={'Authorization': 'Bearer ' + os.environ['RESEND_API_KEY'], 'Content-Type': 'application/json'},
            method='POST'
          )
          urllib.request.urlopen(req, timeout=10)
          "
